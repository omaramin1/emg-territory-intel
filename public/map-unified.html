<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e0e0e0;overflow:hidden}
#map{position:absolute;top:0;left:0;right:0;bottom:0;z-index:1;background:#111}
.leaflet-popup-content-wrapper{background:#1a1a2e!important;color:#e0e0e0!important;border:1px solid #333!important;border-radius:8px!important}
.leaflet-popup-tip{background:#1a1a2e!important}
.leaflet-tooltip{background:#1a1a2e!important;color:#e0e0e0!important;border:1px solid #444!important;border-radius:6px!important;padding:8px 12px!important;font-size:12px!important;max-width:320px!important}

/* HEADER */
#header{position:fixed;top:0;left:0;right:0;height:48px;background:linear-gradient(135deg,#0d0d1a,#1a1a2e);border-bottom:1px solid #333;z-index:1100;display:flex;align-items:center;padding:0 16px;gap:14px}
#header h1{font-size:16px;font-weight:700;color:#fff;white-space:nowrap}
#state-select{background:#222;color:#fff;border:1px solid #555;border-radius:6px;padding:5px 12px;font-size:13px;cursor:pointer;outline:none}
#state-select:hover{border-color:#00aaff}
#header .badge{font-size:10px;background:#333;padding:3px 8px;border-radius:10px;color:#888}
#search-box{margin-left:auto;display:flex;align-items:center;gap:6px}
#search-box input{width:160px;padding:5px 10px;background:#222;border:1px solid #444;border-radius:6px;color:#fff;font-size:12px;outline:none}
#search-box input:focus{border-color:#00aaff}
#search-box button{padding:5px 12px;background:#00aaff;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px}

/* TOGGLE PANEL */
#toggle-panel{position:fixed;top:56px;left:12px;z-index:1050;background:#111;border:1px solid #333;border-radius:8px;padding:8px 10px;font-size:11px;max-height:calc(100vh - 120px);overflow-y:auto;width:190px}
#toggle-panel label{display:flex;align-items:center;gap:6px;padding:3px 0;cursor:pointer;white-space:nowrap}
#toggle-panel input[type="checkbox"]{accent-color:#00aaff;width:14px;height:14px}
.toggle-divider{height:1px;background:#333;margin:5px 0}
.toggle-header{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:0.5px;margin:4px 0 2px}

/* INFO PANEL */
#info-panel{position:fixed;top:56px;right:12px;width:300px;max-height:calc(100vh - 120px);background:#111;border:1px solid #333;border-radius:8px;z-index:1050;overflow-y:auto;display:none}
#info-panel .info-header{padding:10px 12px;background:#1a1a2e;border-bottom:1px solid #333;display:flex;justify-content:space-between;align-items:center}
#info-panel .info-header h3{font-size:13px;color:#00aaff}
#info-panel .info-close{cursor:pointer;color:#666;font-size:18px}
#info-panel .info-body{padding:10px 12px;font-size:12px}
.info-section{margin-top:10px;padding-top:8px;border-top:1px solid #222}
.info-section-title{font-size:11px;color:#00aaff;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.info-row{display:flex;justify-content:space-between;padding:2px 0}
.info-label{color:#888}
.info-value{color:#fff;font-weight:600}










/* UPLOAD OVERLAY */
#upload-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:2000;justify-content:center;align-items:center}
#upload-box{background:#1a1a2e;border:2px dashed #555;border-radius:12px;padding:40px;text-align:center;max-width:600px;width:90%}
#upload-box.drag-over{border-color:#00aaff;background:#0d1a2e}
#upload-box h2{color:#fff;margin-bottom:12px}
#upload-box p{color:#888;margin-bottom:16px;font-size:13px}
#upload-file-input{display:none}
#upload-btn{padding:10px 24px;background:#00aaff;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer}
#upload-btn:hover{background:#0088dd}
#upload-close{position:absolute;top:20px;right:20px;color:#666;font-size:28px;cursor:pointer}
#upload-close:hover{color:#fff}
#upload-status{margin-top:16px;color:#aaa;font-size:12px;display:none}
#upload-mapping{display:none;margin-top:20px;text-align:left}
#upload-mapping label{display:flex;justify-content:space-between;align-items:center;margin:6px 0;font-size:12px;color:#aaa}
#upload-mapping select{background:#222;color:#fff;border:1px solid #444;border-radius:4px;padding:4px 8px;font-size:12px}
#upload-apply{margin-top:16px;padding:8px 20px;background:#00cc66;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px}

/* LEGEND */
#legend{position:fixed;bottom:56px;left:12px;z-index:1040;background:#111;border:1px solid #333;border-radius:8px;padding:8px 10px;font-size:10px}
#legend .leg-title{font-size:10px;color:#666;text-transform:uppercase;margin-bottom:4px}
.leg-row{display:flex;align-items:center;gap:6px;padding:1px 0}
.leg-swatch{width:14px;height:10px;border-radius:2px}

/* LOADING */
#loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#0a0a0a;z-index:3000;display:flex;flex-direction:column;justify-content:center;align-items:center}
#loading-overlay h2{color:#fff;margin-bottom:20px}
#loading-bar{width:300px;height:6px;background:#222;border-radius:3px;overflow:hidden}
#loading-fill{width:0;height:100%;background:#00aaff;border-radius:3px;transition:width 0.3s}
#loading-text{margin-top:12px;color:#888;font-size:13px}

.zone-label{background:none!important;border:none!important}
@keyframes pulse-ring{0%{opacity:0.8;transform:scale(1)}100%{opacity:0;transform:scale(1.6)}}
.eh-pulse{animation:pulse-ring 2s ease-out infinite}
.reco-panel{position:absolute;top:10px;left:10px;z-index:1100;background:rgba(10,10,18,0.97);border:1px solid #3b82f6;border-radius:8px;backdrop-filter:blur(10px);width:340px;max-height:calc(100vh - 30px);overflow-y:auto;transition:width 0.2s}
.reco-panel.collapsed{width:44px;overflow:hidden}
.reco-panel.collapsed .reco-body{display:none}
.reco-header{padding:10px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(59,130,246,0.3)}
.reco-header h3{color:#3b82f6;font-size:13px;font-weight:600;margin:0}
.reco-body{padding:8px}
.reco-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all 0.2s}
.reco-card:hover{border-color:rgba(59,130,246,0.4);background:rgba(59,130,246,0.05);transform:translateX(2px)}
.reco-card .reco-rank{font-size:20px;font-weight:900;margin-right:10px}
.reco-card .reco-zip{font-size:14px;font-weight:700;color:#fff}
.reco-card .reco-city{font-size:11px;color:#aaa}
.reco-card .reco-stats{font-size:10px;color:#888;margin-top:4px}
.reco-card .reco-tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;margin-right:4px}
.reco-share{background:none;border:1px solid #3b82f6;color:#3b82f6;border-radius:4px;padding:2px 8px;font-size:10px;cursor:pointer;float:right;transition:all 0.2s}

<!-- HEADER -->
<div id="header">
    <a href="/" style="color:#888;text-decoration:none;font-size:13px;margin-right:4px;transition:color 0.2s" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#888'">←</a>
    <h1>Territory Intelligence Engine</h1>
    <select id="state-select" onchange="switchState(this.value)">
        <option value="NY">New York</option>
        <option value="MD">Maryland</option>
        <option value="VA">Virginia</option>
        <option value="DE">Delaware</option>
    </select>
    <span class="badge" id="stats-badge">Loading...</span>
    <div id="search-box">
        <input type="text" id="search-input" placeholder="Search ZIP or city..." onkeydown="if(event.key==='Enter')searchZip(this.value)"/>
        <button onclick="searchZip(document.getElementById('search-input').value)"></button>
    </div>
</div>

<!-- TOGGLE PANEL -->
<div id="toggle-panel"></div>

<!-- MAP -->
<div id="map"></div>

<!-- AI RECOMMENDATIONS -->
<div class="reco-panel" id="recoPanel">
    <div class="reco-header" onclick="document.getElementById('recoPanel').classList.toggle('collapsed')">
        <h3>🎯 Today's Targets</h3>
        <span style="color:#888;font-size:10px;" id="recoCount">Loading...</span>
    </div>
    <div class="reco-body" id="recoBody">
        <div style="padding:8px;color:#888;font-size:11px;text-align:center;" id="recoLoading">Analyzing 154K+ sales records...</div>
    </div>
</div>

<!-- INFO PANEL -->
<div id="info-panel">
    <div class="info-header"><h3 id="info-title"></h3><span class="info-close" onclick="document.getElementById('info-panel').style.display='none'">&times;</span></div>
    <div class="info-body" id="info-body"></div>
</div>

<!-- PRIORITY PANEL -->
<div id="priority-body"></div>
</div>


<!-- LEGEND -->
<div id="legend">
    <div class="leg-title" id="legend-title">Sales Density</div>
    <div id="legend-rows"></div>
</div>

<!-- UPLOAD OVERLAY -->
<div id="upload-overlay" onclick="if(event.target===this)closeUpload()">
    <span id="upload-close" onclick="closeUpload()">&times;</span>
    <div id="upload-box">
        <h2> Upload Sales Data</h2>
        <p>Drag & drop CSV / XLSX or click to browse.<br>Auto-detects lat/lon, address, ZIP columns.</p>
        <input type="file" id="upload-file-input" accept=".csv,.xlsx,.xls" onchange="handleFileSelect(this.files[0])"/>
        <button id="upload-btn" onclick="document.getElementById('upload-file-input').click()">Choose File</button>
        <div id="upload-status"></div>
        <div id="upload-mapping"></div>
    </div>
</div>

<!-- LOADING -->
<div id="loading-overlay">
    <h2 id="loading-state">Territory Intelligence Engine</h2>
    <div id="loading-bar"><div id="loading-fill"></div></div>
    <div id="loading-text">Initializing...</div>
</div>

function getIncomeColor(inc) {
    if (inc < 25000) return '#ff4444';
    if (inc < 35000) return '#ff8844';
    if (inc < 50000) return '#ffcc44';
    if (inc < 75000) return '#88cc44';
    return '#44cc88';
}

function getRaceDominant(d) {
    if (!d) return { color: '#888', isDiverse: false, top3: 'N/A' };
    const groups = [
        { pct: d.rw || 0, label: 'White', color: '#e8d4a8' },
        { pct: d.rb || 0, label: 'Black', color: '#4a90d9' },
        { pct: d.rh || 0, label: 'Hispanic', color: '#e67e22' },
        { pct: d.ra || 0, label: 'Asian', color: '#27ae60' },
        { pct: d.ro || 0, label: 'Other', color: '#95a5a6' }
    ].sort((a, b) => b.pct - a.pct);
    const isDiverse = groups[0].pct < 50;
    return {
        color: isDiverse ? '#ff69b4' : groups[0].color,
        isDiverse,
        top3: groups.slice(0, 3).map(g => `${g.label} ${g.pct}%`).join(' · ')
    };
}

function getDensityColor(count) {
    const cfg = STATE_CONFIG[currentState];
    for (let i = 0; i < cfg.densityThresholds.length; i++) {
        if (count >= cfg.densityThresholds[i]) return cfg.densityColors[i];
    }
    return '#444444';
}
function getDensityOpacity(count) {
    const cfg = STATE_CONFIG[currentState];
    for (let i = 0; i < cfg.densityThresholds.length; i++) {
        if (count >= cfg.densityThresholds[i]) return cfg.densityOpacities[i];
    }
    return 0.05;
}
function getDensityLabel(count) {
    const cfg = STATE_CONFIG[currentState];
    for (let i = 0; i < cfg.densityThresholds.length; i++) {
        if (count >= cfg.densityThresholds[i]) return cfg.densityLabels[i];
    }
    return '—';
}

// Point-in-polygon (ray casting)
function pointInPoly(lat, lon, poly) {
    let inside = false;
    for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
        const [yi, xi] = poly[i], [yj, xj] = poly[j];
        if ((yi > lat) !== (yj > lat) && lon < (xj - xi) * (lat - yi) / (yj - yi) + xi) {
            inside = !inside;
        }
    }
    return inside;
}

function getUtilityForZip(lat, lon) {
    const cfg = STATE_CONFIG[currentState];
    for (const [name, u] of Object.entries(cfg.utilities)) {
        if (pointInPoly(lat, lon, u.coords)) return name;
    }
    return 'Other';
}

async function loadHousingTargets() {
    if (housingTargetsLoaded) return;

        const resp = await fetch(prefix + '_housing_targets.json');
        const targets = await resp.json();
        housingTargetGroup.clearLayers();
        targets.forEach(p => {
            const cfg=pinConfig[p.type]||pinConfig.eh_high;
            const isCombo=p.type.startsWith('eh_')&&p.type!=='eh_high'&&p.type!=='eh_critical';
            const sz=isCombo?30:(p.val>=60?26:20);
            const icon=L.divIcon({className:'',html:`<div style="width:${sz}px;height:${sz}px;border-radius:${p.type.includes('apt')?'4px':'50%'};background:#0f172a;border:2px solid ${cfg.border};display:flex;align-items:center;justify-content:center;font-size:${sz>=26?13:10}px;box-shadow:0 2px 6px rgba(0,0,0,0.5);">${cfg.emoji.charAt(0)}</div>`,iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
            let h=`<div style="min-width:260px;font-family:system-ui;font-size:12px;"><div style="background:#1a1a2e;margin:-10px -10px 8px;padding:10px 12px;border-radius:4px 4px 0 0;"><div style="font-size:14px;font-weight:800;color:${cfg.color};">${cfg.emoji} ${cfg.label}</div><div style="color:#888;font-size:10px;">Tract: ${p.id} · Score: ${p.val}</div>`;
            if(isCombo)h+=`<div style="color:#ffd700;font-weight:700;">★ COMBO</div>`;
            h+=`</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:3px 10px;font-size:11px;">`;
            if(p.mob>0)h+=`<div><span style="color:#ff9800;">●</span> Mobile: <b>${p.mob}%</b> (${p.mu})</div>`;
            if(p.apt>0)h+=`<div><span style="color:#9c27b0;">●</span> Apt: <b>${p.apt}%</b> (${p.au})</div>`;
            if(p.th>0)h+=`<div><span style="color:#00bcd4;">●</span> TH: <b>${p.th}%</b> (${p.tu})</div>`;
            h+=`<div><span style="color:#f44336;">●</span> EH: <b>${p.eh}%</b></div>`;
            h+=`<div>HH: <b>${p.hh.toLocaleString()}</b></div>`;
            h+=`<div>Lookalike: <b>${p.la}(${p.las})</b></div></div></div>`;
            L.marker([p.lat,p.lon],{icon,zIndexOffset:p.val+200}).bindPopup(h,{maxWidth:320}).addTo(housingTargetGroup);
        });
        housingTargetsLoaded = true;
        updateStatus(targets.length+' housing targets loaded');
    } catch(e){console.warn('Housing targets error:',e);}
}

// ── UNIVERSAL SMART TARGETING PIN SYSTEM ──
const allTrackableToggles = new Set(['mobileHomes','apartments','townhomes','elecHeat','lookalike','canvassZones','homeScore','saturationMap','ehZones','incomeOverlay']);
const activeTargets = new Set();
const targetPinGroup = L.featureGroup();
const allCriteria = {
    mobileHomes:p=>(p.mob_pct||0)>=10, apartments:p=>(p.apt_pct||0)>=15, townhomes:p=>(p.th_pct||0)>=10,
    elecHeat:p=>(p.eh_pct||0)>=40, ehZones:p=>(p.eh_pct||0)>=25,
    lookalike:p=>(p.lookalike_grade==='S'||p.lookalike_grade==='A'),
    canvassZones:p=>(p.cg||p.canvass_grade||'D')<='B', homeScore:p=>(p.hs||p.home_score||0)>=60,
    incomeOverlay:p=>{const i=p.la_income||0;return i>=30000&&i<=65000;}, saturationMap:p=>true
};
const scoreWeights = {
    mobileHomes:p=>Math.min(25,p.mob_pct||0), apartments:p=>Math.min(15,(p.apt_pct||0)/3), townhomes:p=>Math.min(15,p.th_pct||0),
    elecHeat:p=>Math.min(25,Math.max(0,(p.eh_pct||0)-30)/2), ehZones:p=>Math.min(20,(p.eh_pct||0)/4),
    lookalike:p=>(p.lookalike_score||0)/3, canvassZones:p=>{const g=p.cg||p.canvass_grade||'D';return g==='A'?25:g==='B'?15:5;},
    homeScore:p=>Math.min(20,(p.hs||p.home_score||0)/5),
    incomeOverlay:p=>{const i=p.la_income||0;return(i>=35000&&i<=55000)?20:(i>=25000&&i<=65000)?10:0;},
    saturationMap:p=>5
};
const toggleNames = {mobileHomes:'Mobile',apartments:'Apt',townhomes:'TH',elecHeat:'EH 40%+',ehZones:'EH',lookalike:'Lookalike',canvassZones:'Canvass',homeScore:'Home Score',incomeOverlay:'Income',saturationMap:'Saturation'};

function toggleLayer(id, visible) {
    if (id === 'housingTargets') {
        if (visible) { loadHousingTargets().then(() => { if (!map.hasLayer(housingTargetGroup)) map.addLayer(housingTargetGroup); }); }
        else { if (map.hasLayer(housingTargetGroup)) map.removeLayer(housingTargetGroup); }
        // Still run targeting pin update
        if (allTrackableToggles.has(id)) { if (visible) activeTargets.add(id); else activeTargets.delete(id); updateTargetPins(); }
        return;
    }
    const group = layerMap[id];
    if (!group) return;
    if (visible) map.addLayer(group);
    else map.removeLayer(group);
    if (allTrackableToggles.has(id)) {
        if (visible) activeTargets.add(id); else activeTargets.delete(id);
        updateTargetPins();
    }
}

function updateTargetPins() {
    targetPinGroup.clearLayers();
    if (!map.hasLayer(targetPinGroup)) map.addLayer(targetPinGroup);
    if (activeTargets.size<1||!_canvassData||!_canvassData.tracts) return;
    const matches=[];
    _canvassData.tracts.features.forEach(f=>{
        const p=f.properties; let pass=true;
        for(const t of activeTargets){if(allCriteria[t]&&!allCriteria[t](p)){pass=false;break;}}
        if(!pass)return;
        let q=0;for(const t of activeTargets){if(scoreWeights[t])q+=scoreWeights[t](p);}
        q+=Math.min(10,(p.hh||p.hu||0)/200);q=Math.round(q);
        try{const b=L.geoJSON(f).getBounds().getCenter();matches.push({lat:b.lat,lng:b.lng,q,p});}catch(e){}
    });
    matches.sort((a,b)=>b.q-a.q);
    const names=[...activeTargets].map(n=>toggleNames[n]||n).join(' + ');
    updateStatus(`${names}: ${matches.length} match → Top ${Math.min(50,matches.length)} pinned`);
    matches.slice(0,50).forEach((m,i)=>{
        const r=i+1,p=m.p,pc=r<=10?'#ffd700':r<=25?'#ff8c00':'#ff6347',sz=r<=10?28:r<=25?22:18;
        const icon=L.divIcon({className:'',html:`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${pc};border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;font-size:${r<=10?12:10}px;font-weight:800;color:#000;">${r}</div>`,iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
        let h=`<div style="min-width:260px;font-family:system-ui;font-size:12px;"><div style="background:#1a1a2e;margin:-10px -10px 8px;padding:10px 12px;border-radius:4px 4px 0 0;"><div style="font-size:18px;font-weight:800;color:${pc};">#${r} TARGET</div><div style="color:#888;">${names}</div><div style="color:#fff;font-weight:600;">Score: ${m.q}</div></div>`;
        h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;">`;
        if(p.mob_pct>0)h+=`<div><span style="color:#ff9800;">●</span> Mobile: <b>${p.mob_pct}%</b></div>`;
        if(p.apt_pct>0)h+=`<div><span style="color:#9c27b0;">●</span> Apt: <b>${p.apt_pct}%</b></div>`;
        if(p.th_pct>0)h+=`<div><span style="color:#00bcd4;">●</span> TH: <b>${p.th_pct}%</b></div>`;
        if(p.eh_pct>0)h+=`<div><span style="color:#f44336;">●</span> EH: <b>${p.eh_pct}%</b></div>`;
        h+=`<div>HH: <b>${(p.hh||p.hu||0).toLocaleString()}</b></div>`;
        const g=p.cg||p.canvass_grade||'—';if(g!=='—')h+=`<div>Canvass: <b>${g}</b></div>`;
        if(p.lookalike_score)h+=`<div>Lookalike: <b>${p.lookalike_grade}(${p.lookalike_score})</b></div>`;
        h+=`</div></div>`;
        L.marker([m.lat,m.lng],{icon,zIndexOffset:1000-r}).bindPopup(h,{maxWidth:320}).addTo(targetPinGroup);
    });
}

    const cfg = STATE_CONFIG[stateCode];
    document.getElementById('loading-overlay').style.display = 'flex';
    document.getElementById('loading-state').textContent = cfg.name + ' Territory Intelligence';
    updateLoading('Clearing layers...', 0);

    // Clear all existing layers
    Object.values(fg).forEach(group => {
        if (map.hasLayer(group)) map.removeLayer(group);
        group.clearLayers();
    });
    fg = {};
    layerMap = {};
    zipSalesData = {};
    demoData = {};
    dacData = {};
    salesData = [];
    zipCentroids = {};
    zipGeoFeatures = {};
    boundaryFeatures = null;
    priorityData = {};

    // Initialize feature groups from toggles config
    const groupIds = cfg.toggles.filter(t => t !== '_divider' && t.id).map(t => t.id);
    if (cfg.hasExtras) { ['ordersLayer','lmiOutlines','housingPins','allElectricPins'].forEach(id => { if (!groupIds.includes(id)) groupIds.push(id); }); }
    if (cfg.lmiData && !groupIds.includes('lmiOutlines')) groupIds.push('lmiOutlines');
    if (cfg.housingPins && !groupIds.includes('housingPins')) groupIds.push('housingPins');
    Object.keys(cfg.utilities).forEach(u => { const id = 'util_' + u; if (!groupIds.includes(id)) groupIds.push(id); });

    groupIds.forEach(id => {
        if (id === 'salesCluster') {
            fg[id] = L.markerClusterGroup({ maxClusterRadius: 40, spiderfyOnMaxZoom: true, showCoverageOnHover: false, disableClusteringAtZoom: 14 });
        } else {
            fg[id] = L.featureGroup();
        }
        layerMap[id] = fg[id];
    });

    // Build UI
    buildTogglePanel();
    buildLegend();

    // Set map view
    map.setView(cfg.center, cfg.zoom);

    // Load all data — all states use the same ZIP boundary path
    await loadZipBoundaries();
    await loadSalesData();
    if (cfg.hasExtras) await loadVAExtras();  // VA-specific: orders, LMI zones, communities, all-electric
    loadUtilityTerritories();
    loadDACZones();
    if (cfg.lmiData) loadLMIOutlines();
    if (cfg.housingPins) loadHousingPins();
    loadTargetZones();
    await loadCanvassTargeting();
    setupUniversalClick();

    // Apply default toggles
    cfg.toggles.forEach(t => {
        if (t === '_divider') return;
        if (t.default && layerMap[t.id]) map.addLayer(layerMap[t.id]);
    });

    // Update stats
    const totalSales = salesData.length;
    const zipCount = Object.keys(zipSalesData).length;
    document.getElementById('stats-badge').textContent = `${totalSales.toLocaleString()} sales · ${zipCount} ZIPs`;

    updateLoading('Complete!', 100);
    setTimeout(() => {
        document.getElementById('loading-overlay').style.display = 'none';
    }, 400);

    // Load recommendations for the newly switched state
    loadRecommendations();
}

async function loadRecommendations() {
    if (!currentState) return;
    try {
        const recs = await sbFetch('/v_recommended_areas?select=zip_code,city,state,old_deals,new_deals,payable,close_rate,last_canvassed,last_30d,last_7d,reps_deployed,recent_reps,recommend_score,recommendation&recommend_score=gte.50&state=eq.' + currentState + '&order=recommend_score.desc,old_deals.desc&limit=25');

        const body = document.getElementById('recoBody');
        if (!recs.length) { body.innerHTML = '<div style="padding:12px;color:#888;text-align:center;">No recommendations — check back after uploading new data</div>'; return; }

        document.getElementById('recoCount').textContent = recs.length + ' areas';

        let html = '';
        recs.forEach((r, i) => {
            const rank = i + 1;
            const tagColor = r.recommendation.includes('REVISIT') ? '#ffd700' : r.recommendation.includes('REOPEN') ? '#ff9800' : r.recommendation.includes('UNTOUCHED') ? '#00c853' : r.recommendation.includes('ACTIVE') ? '#ff1744' : '#3b82f6';
            const tagBg = tagColor + '22';
            const tagText = r.recommendation.split('—')[0].trim();

            // Shareable link: zoom to this ZIP
            const shareUrl = window.location.href.split('?')[0] + '?zip=' + r.zip_code;

            html += '<div class="reco-card" onclick="if(zipCentroids[\'' + r.zip_code + '\']){map.setView(zipCentroids[\'' + r.zip_code + '\'],14);}">';
            html += '<div style="display:flex;align-items:center;">';
            html += '<div class="reco-rank" style="color:' + (rank<=3?'#ffd700':rank<=7?'#ff8c00':'#888') + ';">' + rank + '</div>';
            html += '<div style="flex:1;">';
            html += '<div><span class="reco-zip">' + r.zip_code + '</span> <span class="reco-city">' + (r.city||'') + ', ' + r.state + '</span></div>';
            html += '<div style="margin-top:2px;"><span class="reco-tag" style="background:' + tagBg + ';color:' + tagColor + ';border:1px solid ' + tagColor + '44;">' + tagText + '</span></div>';
            html += '<div class="reco-stats">';
            html += 'Old: ' + r.old_deals + ' · New: ' + r.new_deals + ' · Payable: ' + r.payable + ' · Close: ' + r.close_rate + '%';
            if (r.last_canvassed) html += '<br>Last hit: ' + r.last_canvassed + ' · Reps: ' + r.reps_deployed;
            if (r.recent_reps > 0) html += ' · <span style="color:#ff9800;">Active: ' + r.recent_reps + ' reps</span>';
            html += '</div>';
            html += '</div>';
            const zipMsg = encodeURIComponent('📍 ZIP '+r.zip_code+' — '+(r.city||'')+', '+r.state+'\n'+tagText+'\nOld: '+r.old_deals+' · New: '+r.new_deals+' · Payable: '+r.payable+'\nhttps://www.google.com/maps?q='+r.zip_code);
            html += '<button class="reco-share" onclick="event.stopPropagation();window.open(\'sms:?&body='+zipMsg+'\');" title="Text to lead">💬</button>';
            html += '</div></div>';
        });

        body.innerHTML = html;
    } catch(e) {
        console.warn('Recommendations load error:', e);
        document.getElementById('recoBody').innerHTML = '<div style="padding:12px;color:#888;text-align:center;">Could not load recommendations</div>';
    }
}

async function loadZipBoundaries() {
    const cfg = STATE_CONFIG[currentState];
    const prefix = cfg.dataPrefix;
    updateLoading('Loading ZIP boundaries...', 10);

    const [geoResp, demoResp, dacResp] = await Promise.all([
        fetch(`${prefix}_zip_boundaries.geojson`),
        fetch(`${prefix}_demographics.json`),
        fetch(`${prefix}_dac.json`).catch(() => null)
    ]);

    if (!geoResp.ok) throw new Error('Failed to load boundaries');
    const boundaries = await geoResp.json();
    demoData = demoResp.ok ? await demoResp.json() : {};
    dacData = (dacResp && dacResp.ok) ? await dacResp.json() : {};
    // Load ZIP sales from Supabase (live) with static fallback
    try {
        const stateParam = currentState ? `&state=eq.${currentState}` : '';
        const sbZips = await sbFetch('/v_zip_sales?select=zip_code,city,total_sales,payable,cancelled,reps_deployed,close_rate,first_sale,last_sale,last_30d,last_7d,old_deals,old_payable,new_deals,new_payable,recent_reps,last_new_canvass,deals_per_day' + stateParam + '&limit=5000');
        zipSalesData = {};
        sbZips.forEach(z => {
            zipSalesData[z.zip_code] = { n: z.total_sales, c: z.city||'', completed: z.payable, sent: 0, cancelled: z.cancelled, reps: z.reps_deployed, closeRate: z.close_rate, first: z.first_sale, last: z.last_sale, last30d: z.last_30d, last7d: z.last_7d, oldDeals: z.old_deals, oldPayable: z.old_payable, newDeals: z.new_deals, newPayable: z.new_payable, recentReps: z.recent_reps, lastNewCanvass: z.last_new_canvass, dealsPerDay: z.deals_per_day };
        });
        console.log('ZIP sales from Supabase:', Object.keys(zipSalesData).length, 'ZIPs');
    } catch(sbErr) {
        console.warn('Supabase ZIP sales fallback:', sbErr);
        const dataResp = await fetch(`${prefix}_zip_data.json`);
        zipSalesData = dataResp.ok ? await dataResp.json() : {};
    }
    boundaryFeatures = boundaries.features;

    updateLoading(`Rendering ${boundaries.features.length} ZIP zones...`, 25);

    boundaries.features.forEach(feature => {
        const zip = feature.properties.zip;
        const sales = zipSalesData[zip] || { n: 0, c: '' };
        const count = sales.n;
        const cities = sales.c;
        const color = getDensityColor(count);
        const opacity = getDensityOpacity(count);
        const demo = demoData[zip];
        const dac = dacData[zip];
        const lmi = cfg.lmiData ? cfg.lmiData[zip] : null;

        // Store centroid + feature for priority system
        zipGeoFeatures[zip] = feature;
        if (feature.geometry && feature.geometry.coordinates) {
            const coords = feature.geometry.type === 'MultiPolygon' ? feature.geometry.coordinates[0][0] : feature.geometry.coordinates[0];
            if (coords && coords.length > 0) {
                let sumLat = 0, sumLon = 0;
                coords.forEach(c => { sumLon += c[0]; sumLat += c[1]; });
                zipCentroids[zip] = [sumLat / coords.length, sumLon / coords.length];
            }
        }

        // ── ZIP density choropleth ──
        L.geoJSON(feature, {
            style: { fillColor: color, fillOpacity: opacity, color: count > 0 ? color : '#555', weight: count >= cfg.densityThresholds[1] ? 2 : 1, opacity: count > 0 ? 0.7 : 0.3 },
            onEachFeature: (feat, layer) => {
                layer.on('mouseover', function() { this.setStyle({ weight: 3, opacity: 1, fillOpacity: opacity + 0.15 }); this.bringToFront(); });
                layer.on('mouseout', function() { this.setStyle({ weight: count >= cfg.densityThresholds[1] ? 2 : 1, opacity: count > 0 ? 0.7 : 0.3, fillOpacity: opacity }); });

                let popup = `<b>ZIP ${zip}</b>`;
                if (cities) popup += `<br>${cities}`;
                popup += `<br>Sales: <b style="color:${color}">${count.toLocaleString()}</b> ${getDensityLabel(count)}`;
                if (demo && demo.inc > 0) {
                    popup += `<br>Income: <b style="color:${getIncomeColor(demo.inc)};">$${demo.inc.toLocaleString()}</b>`;
                    const rDom = getRaceDominant(demo);
                    popup += `<br>Demo: <span style="color:${rDom.color};">${rDom.top3}</span>`;
                }
                if (dac) popup += `<br><span style="color:#ff66aa;font-weight:bold;">DAC Zone (${dac.pct}%)</span>`;
                if (lmi) popup += `<br><span style="color:${lmi.util === 'Pepco' ? '#00aaff' : '#3b82f6'};font-weight:bold;">${lmi.util}</span>`;
                layer.bindTooltip(popup, { sticky: true, opacity: 0.95 });
            }
        }).addTo(fg.zipZones);

        // ── Income overlay ──
        if (demo && demo.inc > 0) {
            L.geoJSON(feature, { interactive: false,
                style: { fillColor: getIncomeColor(demo.inc), fillOpacity: 0.35, color: getIncomeColor(demo.inc), weight: 1, opacity: 0.5 }
            }).addTo(fg.incomeOverlay);
        }

        // ── Race overlay ──
        if (demo) {
            const rDom = getRaceDominant(demo);
            L.geoJSON(feature, { interactive: false,
                style: { fillColor: rDom.color, fillOpacity: rDom.isDiverse ? 0.25 : 0.20, color: rDom.color, weight: 1, opacity: 0.4 }
            }).addTo(fg.raceOverlay);
        }

        // ── Electric Heat zones ──
        if (demo && demo.ehp >= cfg.ehThreshold && demo.pop >= 1000) {
            const ehIntensity = demo.ehp >= cfg.ehCritical ? 0.35 : 0.20;
            const ehColor = demo.ehp >= cfg.ehCritical ? '#ff3333' : '#ff6644';
            L.geoJSON(feature, { interactive: false,
                style: { fillColor: ehColor, fillOpacity: ehIntensity, color: ehColor, weight: 2, opacity: 0.6 }
            }).addTo(fg.ehZones);
        }

        // ── DAC zones overlay ──
        if (dac) {
            const dacOpacity = dac.pct >= 80 ? 0.35 : dac.pct >= 50 ? 0.25 : 0.15;
            L.geoJSON(feature, { interactive: false,
                style: { fillColor: '#ff66aa', fillOpacity: dacOpacity, color: '#ff66aa', weight: 2, opacity: 0.6, dashArray: dac.approx ? '5, 3' : null }
            }).addTo(fg.dacZones);
        }
    });
}

async function loadSalesData() {
    const cfg = STATE_CONFIG[currentState];
    updateLoading('Loading sales data from Supabase...', 50);

    const statusColors = {
        'Payable':'#00c853','Completed':'#00c853','Processed':'#00c853','Sent':'#3b82f6',
        'Cancelled':'#ff1744','Cannot Process':'#ff1744','Denied':'#d50000',
        'Invalid':'#d50000','Chargeback':'#aa00ff','Void':'#aa00ff',
        'Rejected':'#ff1744','Duplicate':'#757575','Draft':'#bdbdbd',
        'TPV Not Complete':'#ff9100','Awaiting Client Update':'#ffd600',
        'No Capacity (On Hold)':'#2979ff','Compliance Review':'#e040fb',
        'Incomplete':'#bdbdbd','Test':'#9e9e9e','In Queue':'#00b0ff','Pending':'#ffd600',
        'Failed - Agent Phone Number':'#ff1744','Utility Connect Complete':'#00c853'
    };
    const completedSet = new Set(['Payable','Completed','Processed','Utility Connect Complete']);
    const pipelineSet = new Set(['Sent','Pending','Draft','In Queue','TPV Not Complete','Awaiting Client Update','No Capacity (On Hold)','Compliance Review','Incomplete']);
    const deadSet = new Set(['Cancelled','Cannot Process','Denied','Invalid','Chargeback','Void','Rejected','Duplicate','Test','Failed - Agent Phone Number']);
    function pinStyle(status, sc) {
        if (completedSet.has(status)) return { radius: 5, fillColor: sc, color: '#fff', weight: 1.2, opacity: 1, fillOpacity: 0.9 };
        if (pipelineSet.has(status)) return { radius: 4, fillColor: 'transparent', color: sc, weight: 2.5, opacity: 0.9, fillOpacity: 0.15 };
        if (deadSet.has(status)) return { radius: 2.5, fillColor: sc, color: '#000', weight: 0.5, opacity: 0.5, fillOpacity: 0.4 };
        return { radius: 4, fillColor: sc, color: '#111', weight: 0.5, opacity: 0.8, fillOpacity: 0.75 };
    }

    try {
        const stateFilter = currentState ? `&state=eq.${currentState}` : '';
        // PRIORITY LOADING: Arcadia + Dominion first, old capped at 5K
        const PAGE = 1000;
        let allPoints = [];
        // 1. Arcadia
        updateLoading('Loading Arcadia deals...', 50);
        let o1=0,f1=true; while(f1){const b=await sbFetch(`/v_sale_points?select=latitude,longitude,city,zip_code,order_status,state,campaign${stateFilter}&campaign=eq.Arcadia&limit=${PAGE}&offset=${o1}`);allPoints=allPoints.concat(b);if(b.length<PAGE)f1=false;else o1+=PAGE;}
        // 2. Dominion
        updateLoading(`Loading Dominion... (${allPoints.length} loaded)`, 58);
        let o2=0,f2=true; while(f2){const b=await sbFetch(`/v_sale_points?select=latitude,longitude,city,zip_code,order_status,state,campaign${stateFilter}&campaign=eq.Dominion&limit=${PAGE}&offset=${o2}`);allPoints=allPoints.concat(b);if(b.length<PAGE)f2=false;else o2+=PAGE;}
        // 3. Old (capped)
        updateLoading(`Loading old data... (${allPoints.length} loaded)`, 65);
        const oldB=await sbFetch(`/v_sale_points?select=latitude,longitude,city,zip_code,order_status,state,campaign${stateFilter}&campaign=is.null&limit=5000`);
        allPoints=allPoints.concat(oldB);
        console.log('Sale points loaded:', allPoints.length);
        salesData = allPoints.map(p => [p.latitude, p.longitude, p.city, p.zip_code, p.order_status, p.state, p.campaign]);
        allPoints = null;
        updateLoading(`Clustering ${salesData.length.toLocaleString()} pins...`, 72);

        const _fail = new Set(['Denied','Cannot Process','Duplicate','Test','Bad Info','Disqualified','Rejected']);
        const _pipe = new Set(['Sent','Pending','Processed','Awaiting Client Update','TPV Not Complete','Draft','In Queue']);
        const _claw = new Set(['Chargeback','Void','Clawback']);
        salesData.forEach((d, i) => {
            const [lat, lon, city, zip, status, state, campaign] = d;
            let sc, pinSz, srcLabel;
            if (_claw.has(status)) { sc='#000'; pinSz={radius:5,fillColor:'#111',color:'#ff0000',weight:2,opacity:1,fillOpacity:0.9}; srcLabel='⬛ Clawback'; }
            else if (status==='Payable'||(campaign==='Dominion'&&!_fail.has(status))) { sc='#00c853'; pinSz={radius:4,fillColor:'#00c853',color:'#fff',weight:1,opacity:0.9,fillOpacity:0.8}; srcLabel='🟢 Payable'; }
            else if (_fail.has(status)) { sc='#ff6d00'; pinSz={radius:3.5,fillColor:'#ff6d00',color:'#000',weight:0.5,opacity:0.8,fillOpacity:0.7}; srcLabel='🟠 Failed'; }
            else if (_pipe.has(status)) { sc='#2196f3'; pinSz={radius:3.5,fillColor:'#2196f3',color:'#fff',weight:0.8,opacity:0.8,fillOpacity:0.7}; srcLabel='🔵 Pipeline'; }
            else { sc='#8899aa'; pinSz={radius:2.5,fillColor:'#7788aa',color:'#556',weight:0.4,opacity:0.4,fillOpacity:0.3}; srcLabel='⚫ Old'; }
            const marker = L.circleMarker([lat, lon], pinSz);
            marker.bindTooltip(`${srcLabel} · ${city||''} ${zip||''} — ${status||''}`, {direction:'top',offset:[0,-6]});
            marker.on('click', async function() {
                marker.bindPopup('<div style="text-align:center;padding:8px;">Loading…</div>').openPopup();
                try {
                    const rows = await sbFetch(`/v_sale_points?latitude=eq.${lat}&longitude=eq.${lon}&limit=1`);
                    if (rows.length) { const s=rows[0]; marker.setPopupContent(`<div style="min-width:220px;"><b>${esc(s.city||'')} ${esc(s.zip_code||'')}</b><br>${s.sale_date||''}<br>Status: <b>${esc(s.order_status||'')}</b><br>${s.rep_name?'Rep: '+esc(s.rep_name)+'<br>':''}${s.campaign?'Source: '+esc(s.campaign)+'<br>':''}${s.dwelling_type?'Dwelling: '+esc(s.dwelling_type)+'<br>':''}${s.address?'<span style="color:#888;">'+esc(s.address)+'</span>':''}</div>`); }
                } catch(e) { marker.setPopupContent('Details unavailable'); }
            });
            marker.addTo(fg.salesCluster);
        });
    } catch (sbErr) {
        console.warn('Supabase sales fallback:', sbErr);
        try {
            const resp = await fetch(`${cfg.dataPrefix}_sales.json`);
            if (!resp.ok) return;
            salesData = await resp.json();
            updateLoading(`Clustering ${salesData.length.toLocaleString()} sales pins (static)...`, 65);
            salesData.forEach(d => {
                const [lat, lon, city, zip, date, status, rep] = d;
                const sc = statusColors[status] || '#3b82f6';
                const marker = L.circleMarker([lat, lon], pinStyle(status, sc));
                marker.bindPopup(`<b>${city||''}</b> ${zip||''}<br> ${date||'N/A'}<br>Status: <span style="color:${sc};font-weight:700">${status||'N/A'}</span><br>Rep: ${rep||'N/A'}`);
                marker.addTo(fg.salesCluster);
            });
        } catch (e) {
            console.warn('Sales data load failed:', e);
        }
    }
}

async function loadVAExtras() {
    updateLoading('Loading VA-specific layers...', 55);
    window._vaRoutes = [];

    const [routesResp, commResp, lmiResp, ordersResp] = await Promise.all([
        fetch('routes_lite.geojson').catch(() => null),
        fetch('va_communities.geojson').catch(() => null),
        fetch('https://emgmap2-wp1j.vercel.app/lmi_auto_qualify_zones.geojson').catch(() => null),
        fetch('va_orders.json').catch(() => null)
    ]);

    // Routes (Electric Heat zone polygons from Arcadia)
    updateLoading('Loading Arcadia EH route zones...', 60);
    if (routesResp && routesResp.ok) {
        try {
            const routes = await routesResp.json();
            routes.features.forEach(f => {
                const eh = f.properties.eh || 0;
                if (eh < 50) return;
                const ehColor = eh >= 75 ? '#9933ff' : eh >= 65 ? '#cc44ff' : '#ff6644';
                const ehOpacity = eh >= 75 ? 0.35 : eh >= 65 ? 0.25 : 0.15;
                L.geoJSON(f, {
                    style: { fillColor: ehColor, fillOpacity: ehOpacity, color: ehColor, weight: 1, opacity: 0.5 }
                }).addTo(fg.ehZones);
                window._vaRoutes.push(f);
            });
        } catch(e) { console.warn('Routes load error:', e); }
    }

    // Communities database
    updateLoading('Loading communities database...', 65);
    if (commResp && commResp.ok) {
        try {
            const communities = await commResp.json();
            const commColors = {
                'LIHTC Affordable': '#aa66ff', 'Public Housing': '#ff6666',
                'Section 8/Assisted': '#66aaff', 'HUD Insured': '#66aaff',
                'Senior Housing (202)': '#ffcc66', 'USDA Rural': '#66ff66',
                'Mobile Home Park': '#00ddff'
            };
            const commEmoji = {
                'LIHTC Affordable': '', 'Public Housing': '',
                'Section 8/Assisted': '', 'HUD Insured': '',
                'Senior Housing (202)': '', 'USDA Rural': '',
                'Mobile Home Park': ''
            };

            communities.features.forEach(f => {
                if (!f.geometry || !f.geometry.coordinates) return;
                const [lon, lat] = f.geometry.coordinates;
                const p = f.properties;
                const propType = p.prop_type || 'Unknown';
                const col = commColors[propType] || '#888';
                const emoji = commEmoji[propType] || '';
                const units = p.units || 'N/A';

                const marker = L.circleMarker([lat, lon], {
                    radius: 7, fillColor: col, color: '#fff',
                    weight: 1.5, fillOpacity: 0.85
                });
                marker.bindPopup(`<b>${emoji} ${p.name || 'Community'}</b><br>${propType}<br>City: ${p.city || 'N/A'}<br>Units: <b>${units}</b><br>Buildings: ${p.buildings || 'N/A'}`);
                marker.addTo(fg.housingPins);
            });

            // All-Electric Pins: communities inside high EH routes
            loadAllElectricPins(communities);
        } catch(e) { console.warn('Communities load error:', e); }
    }

    // LMI auto-qualify zones (Arcadia — REAL zones)
    updateLoading('Loading LMI qualification zones (Arcadia)...', 72);
    if (lmiResp && lmiResp.ok) {
        try {
            const lmiGeo = await lmiResp.json();
            lmiGeo.features.forEach(f => {
                const pctLmi = f.properties.avg_pct_low_income || 0;
                if (pctLmi < 40) return;
                const lmiColor = pctLmi >= 90 ? '#00cc66' : pctLmi >= 70 ? '#44aa88' : pctLmi >= 50 ? '#ff8844' : '#ff4444';
                const lmiOpacity = pctLmi >= 70 ? 0.25 : 0.15;
                L.geoJSON(f, {
                    style: { fillColor: lmiColor, fillOpacity: lmiOpacity, color: lmiColor, weight: 1.5, opacity: 0.6 }
                }).addTo(fg.lmiOutlines || (fg.lmiOutlines = L.featureGroup()));
            });
        } catch(e) { console.warn('LMI zones load error:', e); }
    }

    // Recent orders
    updateLoading('Loading recent orders...', 78);
    if (ordersResp && ordersResp.ok) {
        try {
            const orders = await ordersResp.json();
            const statusColors = {
                'Payable': '#00cc66', 'Enrolled': '#00cc66', 'Processed': '#00cc66',
                'Sent': '#ffcc44', 'Pending': '#ffcc44', 'Awaiting Client Update': '#ffcc44',
                'Compliance Review': '#ffcc44', 'TPV Not Complete': '#ffaa22',
                'Cannot Process': '#ff4444', 'Denied': '#ff4444', 'Duplicate': '#ff8844',
                'Canceled': '#888', 'Rejected': '#ff4444', 'Chargeback': '#cc2222',
                'Incomplete': '#999', 'Test': '#666',
                'Failed - Agent Phone Number': '#ff4444'
            };
            orders.forEach(o => {
                const centroid = zipCentroids[o.z];
                if (!centroid) return;

                const jLon = centroid[1] + (Math.random() - 0.5) * 0.008;

                const icon = L.divIcon({

                    iconSize: [11, 11], iconAnchor: [5.5, 5.5]

                marker.addTo(fg.ordersLayer);
            });
        } catch(e) { console.warn('Orders load error:', e); }

}

function loadAllElectricPins(communities) {
    if (!window._vaRoutes || !communities) return;
    const highEhRoutes = window._vaRoutes.filter(f => (f.properties.eh || 0) >= 75);
    if (highEhRoutes.length === 0) return;

    communities.features.forEach(f => {
        if (!f.geometry || !f.geometry.coordinates) return;
        const [lon, lat] = f.geometry.coordinates;
        // Check if community is inside any high-EH route polygon
        let inHighEh = false;
        for (const route of highEhRoutes) {
            if (route.geometry.type === 'Polygon') {
                if (pointInGeoJSONPoly(lat, lon, route.geometry.coordinates[0])) {
                    inHighEh = true; break;
                }
            } else if (route.geometry.type === 'MultiPolygon') {
                for (const poly of route.geometry.coordinates) {
                    if (pointInGeoJSONPoly(lat, lon, poly[0])) {
                        inHighEh = true; break;
                    }
                }
                if (inHighEh) break;
            }
        }
        if (!inHighEh) return;

        const p = f.properties;
        const marker = L.circleMarker([lat, lon], {
            radius: 9, fillColor: '#ff00ff', color: '#fff',
            weight: 2, fillOpacity: 0.9
        });
        marker.bindPopup(`<b>ALL-ELECTRIC ZONE</b><br><b>${p.name || 'Community'}</b><br>${p.prop_type || 'Unknown'}<br>City: ${p.city || 'N/A'}<br>Units: <b>${p.units || 'N/A'}</b><br><span style="color:#ff00ff;">High Electric Heat Area (75%+)</span>`);
        marker.addTo(fg.allElectricPins);
    });
}

// GeoJSON coordinates are [lon, lat] — adapts pointInPoly
function pointInGeoJSONPoly(lat, lon, ring) {
    let inside = false;
    for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
        const [xi, yi] = ring[i]; // [lon, lat]
        const [xj, yj] = ring[j];
        if ((yi > lat) !== (yj > lat) && lon < (xj - xi) * (lat - yi) / (yj - yi) + xi) {
            inside = !inside;
        }
    }
    return inside;
}

function renderCanvassFeatures(features, isBG, targetGroup) {
    features.forEach(f => {
        const p = f.properties;
        const grade = p.cg || p.canvass_grade || 'D';
        const homeS = p.hs || p.home_score || p.daytime_home || 0;
        if (targetGroup === 'canvassZones') {
            L.geoJSON(f, { interactive: false, style: { fillColor: gradeColors[grade], fillOpacity: gradeOpacity[grade], color: gradeColors[grade], weight: isBG ? 1 : 1.5, opacity: 0.6 } }).addTo(fg.canvassZones);
        } else if (targetGroup === 'homeScore') {
            L.geoJSON(f, { interactive: false, style: { fillColor: homeColor(homeS), fillOpacity: 0.25, color: homeColor(homeS), weight: isBG ? 0.8 : 1, opacity: 0.5 } }).addTo(fg.homeScore);
        }
    });
}

function featureInBounds(f, bounds) {
    // Quick bounding box check using first coordinate
    const coords = f.geometry.coordinates;
    let c = coords;
    while (Array.isArray(c[0]) && Array.isArray(c[0][0])) c = c[0];
    if (!Array.isArray(c[0])) return true; // fallback: include
    const pt = c[0];
    // Use a generous buffer around viewport
    const buf = 0.05;
    return pt[1] >= bounds.getSouth() - buf && pt[1] <= bounds.getNorth() + buf &&
           pt[0] >= bounds.getWest() - buf && pt[0] <= bounds.getEast() + buf;
}

function refreshCanvassLayers() {
    if (!_canvassData.tracts) return;
    const zoom = map.getZoom();
    const bounds = map.getBounds();
    const boundsKey = `${zoom}_${bounds.toBBoxString()}`;
    if (_canvassRenderedBounds === boundsKey) return;
    _canvassRenderedBounds = boundsKey;

    const useBG = zoom >= CANVASS_DETAIL_ZOOM && _canvassData.blockgroups;
    const canvassVisible = map.hasLayer(fg.canvassZones);
    const homeVisible = map.hasLayer(fg.homeScore);
    if (!canvassVisible && !homeVisible) return;

    fg.canvassZones.clearLayers();
    fg.homeScore.clearLayers();

    if (useBG) {
        const visible = _canvassData.blockgroups.features.filter(f => featureInBounds(f, bounds));
        if (canvassVisible) renderCanvassFeatures(visible, true, 'canvassZones');
        if (homeVisible) renderCanvassFeatures(visible, true, 'homeScore');
    } else {
        const feats = _canvassData.tracts.features;
        if (canvassVisible) renderCanvassFeatures(feats, false, 'canvassZones');
        if (homeVisible) renderCanvassFeatures(feats, false, 'homeScore');
    }
}

async function loadCanvassTargeting() {

    // Load tract-level, block-group-level, and ZIP targeting in parallel

        fetch(`${cfg.dataPrefix}_auto_qualify.geojson`).catch(() => null),
        fetch(`${cfg.dataPrefix}_blockgroups.geojson`).catch(() => null),
        fetch(`${cfg.dataPrefix}_targeting.json`).catch(() => null),

    _canvassRenderedBounds = null;

    if (targetResp && targetResp.ok) {

    }
    if (tractResp && tractResp.ok) {

    }
    if (bgResp && bgResp.ok) {
        try { _canvassData.blockgroups = await bgResp.json(); } catch(e) {}
    }
    if (turfResp && turfResp.ok) {
        try { _canvassData.turfs = await turfResp.json(); } catch(e) {}
    }

    // Initial render (tract-level since we start zoomed out)
    if (_canvassData.tracts) {
        renderCanvassFeatures(_canvassData.tracts.features, false, 'canvassZones');
        renderCanvassFeatures(_canvassData.tracts.features, false, 'homeScore');
        // Dwelling targeting overlays
        _canvassData.tracts.features.forEach(f => {
            const p = f.properties;
            if (p.mob_pct >= 10) {
                const op = Math.min(0.6, 0.15 + (p.mob_pct / 100));
                L.geoJSON(f, { interactive: false, style: { fillColor: '#ff9800', fillOpacity: op, color: '#ff9800', weight: 1.5, opacity: 0.7 } }).addTo(fg.mobileHomes);
            }
            if (p.apt_pct >= 15) {
                const op = Math.min(0.6, 0.1 + (p.apt_pct / 150));
                L.geoJSON(f, { interactive: false, style: { fillColor: '#9c27b0', fillOpacity: op, color: '#9c27b0', weight: 1, opacity: 0.6 } }).addTo(fg.apartments);
            }
            if (p.th_pct >= 10) {
                const op = Math.min(0.6, 0.1 + (p.th_pct / 100));
                L.geoJSON(f, { interactive: false, style: { fillColor: '#00bcd4', fillOpacity: op, color: '#00bcd4', weight: 1, opacity: 0.6 } }).addTo(fg.townhomes);
            }
            if (p.eh_pct >= 40) {
                const op = Math.min(0.6, 0.15 + ((p.eh_pct - 40) / 100));
                L.geoJSON(f, { interactive: false, style: { fillColor: '#f44336', fillOpacity: op, color: '#f44336', weight: 1.5, opacity: 0.7 } }).addTo(fg.elecHeat);
            }
            // Lookalike opportunity overlay
            const laScore = p.lookalike_score || 0;
            const laGrade = p.lookalike_grade || 'D';
            if (laGrade === 'S' || laGrade === 'A') {
                const laColor = laGrade === 'S' ? '#ffd700' : '#ff8c00';
                const laOp = laGrade === 'S' ? 0.45 : 0.28;
                const laWeight = laGrade === 'S' ? 2.5 : 1.5;
                L.geoJSON(f, { interactive: false, style: { fillColor: laColor, fillOpacity: laOp, color: laColor, weight: laWeight, opacity: 0.8 } }).addTo(fg.lookalike);
            }
        });
    }

    // Saturation layer — ZIP-level from targeting data
    if (boundaryFeatures && _canvassData.targeting) {
        Object.entries(_canvassData.targeting).forEach(([zip, td]) => {
            const feat = zipGeoFeatures[zip];
            if (!feat) return;
            const sat = td.sat || 0;
            if (sat < 0.1) return;
            const sc = sat >= 15 ? '#ff0000' : sat >= 8 ? '#ff6600' : sat >= 3 ? '#ffcc00' : '#00cc66';
            const so = sat >= 15 ? 0.4 : sat >= 8 ? 0.3 : sat >= 3 ? 0.2 : 0.12;
            L.geoJSON(feat, { interactive: false, style: { fillColor: sc, fillOpacity: so, color: sc, weight: 1.5, opacity: 0.6 } }).addTo(fg.saturationMap);
        });

    // Canvass Turfs layer — 8hr shift sized zones
    if (_canvassData.turfs) {
        renderTurfs();

    // Listen for zoom/pan to swap between tract and block-group detail + turfs
    map.off('moveend.canvass').on('moveend.canvass', function() {
        refreshCanvassLayers();
        if (_canvassData.turfs && map.hasLayer(fg.canvassTurfs)) renderTurfs();
    });

// ═══════════════════════════════════════════════════
// ██  PRIORITY SCORING ENGINE (Per Utility)        ██
// ═══════════════════════════════════════════════════
function loadTargetZones() {
    const cfg = STATE_CONFIG[currentState];
    updateLoading('Running priority scoring engine...', 90);

    // Step 1: Compute state median income (population-weighted)
    const incomeEntries = [];
    let totalPop = 0;
    for (const [zip, d] of Object.entries(demoData)) {
        if (d.pop >= 200 && d.inc > 0) {
            incomeEntries.push({ inc: d.inc, pop: d.pop });
            totalPop += d.pop;
        }
    }
    incomeEntries.sort((a, b) => a.inc - b.inc);
    let cumPop = 0, stateMedianIncome = 45000;
    for (const e of incomeEntries) {
        cumPop += e.pop;
        if (cumPop >= totalPop / 2) { stateMedianIncome = e.inc; break; }
    }
    const lmiThreshold = stateMedianIncome * 0.80;

    // Step 2: Score each ZIP
    const scored = [];
    let maxSales = 0;
    Object.values(zipSalesData).forEach(d => { if (d.n > maxSales) maxSales = d.n; });
    const satNorm = maxSales > 0 ? maxSales * 0.7 : 100;

    for (const [zip, d] of Object.entries(demoData)) {
        if (d.pop < 500 || d.inc <= 0) continue;
        const sales = zipSalesData[zip] ? zipSalesData[zip].n : 0;
        const cities = zipSalesData[zip] ? zipSalesData[zip].c : '';
        const centroid = zipCentroids[zip];
        if (!centroid) continue;
        const utility = getUtilityForZip(centroid[0], centroid[1]);

        // Income gap score (0-30): how far below LMI threshold
        const incGap = Math.max(0, (lmiThreshold - d.inc) / lmiThreshold);
        const incScore = Math.min(30, incGap * 40);

        // Saturation gap (0-25): lower sales = more opportunity
        const satRate = sales / (d.pop / 1000);
        const satScore = Math.max(0, 25 - (satRate / 10) * 25);

        // Electric heat intensity (0-25)
        const ehScore = Math.min(25, (d.ehp || 0) / 3);

        // Population density (0-10)
        const popScore = Math.min(10, d.pop / 5000 * 10);

        // Proven sales (0-10)
        const provenScore = Math.min(10, sales / satNorm * 10);

        // DAC bonus (0-5)
        const dacBonus = dacData[zip] ? Math.min(5, dacData[zip].pct / 20) : 0;

        const total = Math.round(incScore + satScore + ehScore + popScore + provenScore + dacBonus);

        if (total >= 15) {
            scored.push({
                zip, city: cities || 'N/A', utility, score: total,
                inc: d.inc, pop: d.pop, sales, ehp: d.ehp || 0,
                dac: !!dacData[zip],
                incS: Math.round(incScore), satS: Math.round(satScore),
                ehS: Math.round(ehScore), popS: Math.round(popScore),
                provenS: Math.round(provenScore)
            });
        }
    }

    scored.sort((a, b) => b.score - a.score);

    // Step 3: Group by utility
    priorityData = {};
    Object.keys(cfg.utilities).forEach(u => priorityData[u] = []);
    priorityData['Other'] = [];

    scored.forEach(s => {
        if (!priorityData[s.utility]) priorityData[s.utility] = [];
        priorityData[s.utility].push(s);
    });

    // Step 4: Add target pins + priority highlights for top ZIPs per utility
    let globalRank = 0;
    Object.entries(priorityData).forEach(([utilName, items]) => {
        const utilColor = cfg.utilities[utilName] ? cfg.utilities[utilName].color : '#888';
        items.slice(0, 30).forEach((s, i) => {
            globalRank++;
            const centroid = zipCentroids[s.zip];
            if (!centroid) return;

            // Target pin
            const pinColor = s.score >= 70 ? '#ff3333' : s.score >= 50 ? '#3b82f6' : '#ffcc44';
            const marker = L.circleMarker(centroid, {
                radius: Math.max(6, Math.min(14, s.score / 8)),
                fillColor: pinColor, color: '#fff', weight: 2, fillOpacity: 0.85
            });
            marker.bindPopup(`<b>#${i + 1} ${s.city}</b><br>ZIP: ${s.zip}<br>Score: <b style="color:${pinColor}">${s.score}/100</b><br>Utility: <span style="color:${utilColor}">${utilName}</span><br>${s.dac ? '<span style="color:#ff66aa;">DAC Zone</span><br>' : ''}Income: $${s.inc.toLocaleString()} | EH: ${s.ehp}%`);
            marker.addTo(fg.targetZones);

            // Priority highlight (top 25 globally)
            if (globalRank <= 25) {
                const feature = zipGeoFeatures[s.zip];
                if (feature) {
                    L.geoJSON(feature, {
                        style: { fillColor: '#10b981', fillOpacity: 0.25, color: '#10b981', weight: 3, opacity: 0.8 }
                    }).addTo(fg.targetZones || (fg.targetZones = L.featureGroup()));
                }
            }
        });
    });

    renderPriorityPanel();
}


// ═══════════════════════════════════════════════════
// ██  PRIORITY PANEL (Per Utility Tabs)            ██
// ═══════════════════════════════════════════════════
function renderPriorityPanel() {
    const cfg = STATE_CONFIG[currentState];
    const tabs = document.getElementById('priority-tabs');
    const body = document.getElementById('priority-body');
    if (!tabs || !body) return; // Elements may not exist yet

    // Build tabs for each utility
    let tabsHtml = '';
    const utilNames = Object.keys(cfg.utilities);
    utilNames.forEach((name, i) => {
        const count = priorityData[name] ? priorityData[name].length : 0;
        tabsHtml += `<button class="${i === 0 ? 'active' : ''}" onclick="showPriorityTab('${name}',this)">${name} (${count})</button>`;
    });
    // Add "All" tab
    const allCount = Object.values(priorityData).reduce((s, a) => s + a.length, 0);
    tabsHtml += `<button onclick="showPriorityTab('__all__',this)">All (${allCount})</button>`;
    tabs.innerHTML = tabsHtml;

    // Show first utility by default
    if (utilNames.length > 0) showPriorityTab(utilNames[0]);
}

function showPriorityTab(utilName, btn) {
    const cfg = STATE_CONFIG[currentState];
    // Update active tab
    if (btn) {
        btn.classList.add('active');
    }

    const body = document.getElementById('priority-body');
    let items;
    if (utilName === '__all__') {
        items = [];
        Object.values(priorityData).forEach(a => items.push(...a));
        items.sort((a, b) => b.score - a.score);
    } else {
        items = priorityData[utilName] || [];
    }

    if (items.length === 0) {
        body.innerHTML = '<div style="padding:20px;text-align:center;color:#666;">No priority ZIPs in this territory</div>';
        return;
    }

    let html = '';
    items.slice(0, 50).forEach((s, i) => {
        const scoreColor = s.score >= 70 ? '#ff3333' : s.score >= 50 ? '#3b82f6' : '#ffcc44';
        const utilColor = cfg.utilities[s.utility] ? cfg.utilities[s.utility].color : '#888';
        html += `<div class="priority-row" onclick="focusZip('${s.zip}')">
            <span class="priority-rank">${i + 1}</span>
            <span class="priority-zip">${s.zip}</span>
            <span class="priority-city">${s.city}</span>
            <span class="priority-badges">
                ${s.dac ? '<span style="background:#ff66aa22;color:#ff66aa;">DAC</span>' : ''}
                ${s.ehp >= cfg.ehThreshold ? '<span style="background:#ff333322;color:#ff3333;">EH</span>' : ''}
                <span style="background:${utilColor}22;color:${utilColor};font-size:8px;">${s.utility}</span>
            </span>
            <span class="priority-score" style="color:${scoreColor}">${s.score}</span>
        </div>`;
    });
    body.innerHTML = html;
}



function focusZip(zip) {
    const centroid = zipCentroids[zip];
    if (centroid) {
        map.setView(centroid, 13);
    }
}

// ██  UNIVERSAL CLICK — ALL DATA POPUP             ██
// ═══════════════════════════════════════════════════
function geoContainsPoint(geometry, lat, lon) {
    const check = ring => pointInPoly(lat, lon, ring.map(c => [c[1], c[0]]));
    if (geometry.type === 'Polygon') return check(geometry.coordinates[0]);
    if (geometry.type === 'MultiPolygon') return geometry.coordinates.some(p => check(p[0]));
    return false;
}

function findZipAtPoint(lat, lon) {
    for (const [zip, feat] of Object.entries(zipGeoFeatures)) {
        if (geoContainsPoint(feat.geometry, lat, lon)) return zip;
    }
    return null;
}

function findTractAtPoint(lat, lon) {
    if (!_canvassData.tracts) return null;
    for (const f of _canvassData.tracts.features) {
        if (geoContainsPoint(f.geometry, lat, lon)) return f.properties;
    }
    return null;
}

function findBlockGroupAtPoint(lat, lon) {
    if (!_canvassData.blockgroups) return null;
    for (const f of _canvassData.blockgroups.features) {
        if (geoContainsPoint(f.geometry, lat, lon)) return f.properties;
    }
    return null;
}

function findTurfAtPoint(lat, lon) {
    if (!_canvassData.turfs) return null;
    for (const f of _canvassData.turfs.features) {
        if (geoContainsPoint(f.geometry, lat, lon)) return f.properties;
    }
    return null;
}

            if (dac) h += `<div><span style="color:#ff66aa;font-weight:700;">DAC Zone</span> — ${dac.pct}% coverage</div>`;
            if (lmi) h += `<div><span style="color:${lmi.util === 'Pepco' ? '#00aaff' : '#3b82f6'};font-weight:700;">${lmi.util}</span> — LMI: ${lmi.lmi}% · ${lmi.type}</div>`;
            h += `</div>`;
        }

        // Canvass Turf assignment
        if (turf) {
            const tc = { 'A': '#10b981', 'B': '#ffdd00', 'C': '#ff8844', 'D': '#ff4444' };
            const tg = turf.grade || 'C';
            h += `<div style="border-top:1px solid #333;padding-top:6px;margin-top:4px;">`;
            h += `<div style="font-weight:700;color:#fff;margin-bottom:4px;">Canvass Turf #${turf.id} <span style="color:${tc[tg]};font-weight:700;">(Grade ${tg})</span></div>`;
            h += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:2px 12px;">`;
            h += `<div><span style="color:#888;">Est. Doors:</span> <b style="color:${tc[tg]}">${turf.doors}</b></div>`;
            h += `<div><span style="color:#888;">Households:</span> ${turf.hh.toLocaleString()}</div>`;
            h += `<div><span style="color:#888;">Block Groups:</span> ${turf.bgs}</div>`;
            h += `<div><span style="color:#888;">Area:</span> ${turf.area} sq mi</div>`;
            h += `<div><span style="color:#888;">Opp Score:</span> ${turf.opp}/100</div>`;
            h += `<div><span style="color:#888;">Home Score:</span> ${turf.hs}/100</div>`;
            h += `</div>`;
            h += `<div style="margin-top:4px;padding:4px 8px;background:rgba(16,185,129,0.1);border-radius:3px;font-size:11px;color:#aaa;">~8hr shift · ~25 doors/hr · ${turf.county}</div>`;
            h += `</div>`;
        }

        h += `</div>`;

        L.popup({ maxWidth: 400, className: 'universal-popup' })
            .setLatLng(e.latlng)
            .setContent(h)
            .openOn(map);
    });
}

// ═══════════════════════════════════════════════════
// ██  SEARCH                                       ██
// ═══════════════════════════════════════════════════
function searchZip(query) {
    if (!query) return;
    query = query.trim().toUpperCase();

    // Direct ZIP match
    if (zipCentroids[query]) {
        map.setView(zipCentroids[query], 14);
        const sales = zipSalesData[query] || { n: 0, c: '' };
        const demo = demoData[query];
        const dac = dacData[query];
        const lmi = STATE_CONFIG[currentState].lmiData ? STATE_CONFIG[currentState].lmiData[query] : null;
        showZipDetail(query, sales.n, sales.c, demo, dac, lmi);
        return;
    }

    // City name search
    for (const [zip, data] of Object.entries(zipSalesData)) {
        if (data.c && data.c.toUpperCase().includes(query)) {
            const centroid = zipCentroids[zip];
            if (centroid) {
                map.setView(centroid, 12);
                const demo = demoData[zip];
                const dac = dacData[zip];
                const lmi = STATE_CONFIG[currentState].lmiData ? STATE_CONFIG[currentState].lmiData[zip] : null;
                showZipDetail(zip, data.n, data.c, demo, dac, lmi);
                return;
            }
        }
    }
    alert('No matching ZIP or city found for: ' + query);
}

// ═══════════════════════════════════════════════════
// ██  UPLOAD ENGINE                                ██
// ═══════════════════════════════════════════════════
let uploadColumns = [];
let uploadRows = [];

function openUpload() {
    document.getElementById('upload-overlay').style.display = 'flex';
    document.getElementById('upload-status').style.display = 'none';
    document.getElementById('upload-mapping').style.display = 'none';
}
function closeUpload() {
    document.getElementById('upload-overlay').style.display = 'none';
}

// Drag & drop
const uploadBox = document.getElementById('upload-box');
uploadBox.addEventListener('dragover', e => { e.preventDefault(); uploadBox.classList.add('drag-over'); });
uploadBox.addEventListener('dragleave', () => uploadBox.classList.remove('drag-over'));
uploadBox.addEventListener('drop', e => {
    e.preventDefault();
    uploadBox.classList.remove('drag-over');
    if (e.dataTransfer.files.length) handleFileSelect(e.dataTransfer.files[0]);
});

function handleFileSelect(file) {
    if (!file) return;
    const status = document.getElementById('upload-status');
    status.style.display = 'block';
    status.textContent = `Parsing ${file.name}...`;

    const ext = file.name.split('.').pop().toLowerCase();
    if (ext === 'csv') {
        const reader = new FileReader();
        reader.onload = e => parseCSV(e.target.result);
        reader.readAsText(file);
    } else if (['xlsx', 'xls'].includes(ext)) {
        const reader = new FileReader();
        reader.onload = e => parseXLSX(e.target.result);
        reader.readAsArrayBuffer(file);
    } else {
        status.textContent = 'Unsupported format. Use CSV, XLSX, or XLS.';
    }
}

function parseCSV(text) {
    const lines = text.split('\n').filter(l => l.trim());
    if (lines.length < 2) return;
    uploadColumns = lines[0].split(',').map(c => c.trim().replace(/^"|"$/g, ''));
    uploadRows = lines.slice(1).map(l => {
        const vals = [];
        let current = '', inQuote = false;
        for (const ch of l) {
            if (ch === '"') inQuote = !inQuote;
            else if (ch === ',' && !inQuote) { vals.push(current.trim()); current = ''; }
            else current += ch;
        }
        vals.push(current.trim());
        return vals;
    });
    showColumnMapping();
}

function parseXLSX(data) {
    try {
        const wb = XLSX.read(data, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
        if (rows.length < 2) return;
        uploadColumns = rows[0].map(c => String(c || '').trim());
        uploadRows = rows.slice(1).map(r => r.map(c => String(c || '').trim()));
        showColumnMapping();
    } catch (e) {
        document.getElementById('upload-status').textContent = 'Error parsing file: ' + e.message;
    }
}

function autoDetectColumn(target) {
    const patterns = {
        lat: /^(lat|latitude|y|lat_|geo_lat)/i,
        lon: /^(lon|lng|longitude|x|lon_|geo_lon|long)/i,
        zip: /^(zip|zipcode|zip_code|postal|postalcode)/i,
        city: /^(city|town|municipality|place)/i,
        address: /^(address|addr|street|location|full_addr)/i,
        date: /^(date|created|signed|enrollment|install)/i,
        name: /^(name|customer|first|last|full_name)/i
    };
    const re = patterns[target];
    if (!re) return -1;
    return uploadColumns.findIndex(c => re.test(c));
}

function showColumnMapping() {
    const status = document.getElementById('upload-status');
    status.textContent = `Found ${uploadRows.length} rows, ${uploadColumns.length} columns.`;

    const mapping = document.getElementById('upload-mapping');
    mapping.style.display = 'block';

    const fields = [
        { key: 'lat', label: 'Latitude', required: false },
        { key: 'lon', label: 'Longitude', required: false },
        { key: 'zip', label: 'ZIP Code', required: false },
        { key: 'city', label: 'City', required: false },
        { key: 'date', label: 'Date', required: false }
    ];

    let html = '<div style="font-size:12px;color:#00aaff;margin-bottom:8px;">Map columns:</div>';
    fields.forEach(f => {
        const detected = autoDetectColumn(f.key);
        html += `<label>${f.label}: <select id="map-${f.key}">`;
        html += '<option value="-1">— skip —</option>';
        uploadColumns.forEach((c, i) => {
            html += `<option value="${i}" ${i === detected ? 'selected' : ''}>${c}</option>`;
        });
        html += '</select></label>';
    });
    html += `<button id="upload-apply" onclick="processUpload()">Apply ${uploadRows.length} Records</button>`;
    mapping.innerHTML = html;
}

function processUpload() {
    const getCol = key => parseInt(document.getElementById('map-' + key).value);
    const latIdx = getCol('lat');
    const lonIdx = getCol('lon');
    const zipIdx = getCol('zip');
    const cityIdx = getCol('city');
    const dateIdx = getCol('date');

    const status = document.getElementById('upload-status');
    status.textContent = 'Processing...';

    const points = [];
    let needGeocode = 0;

    uploadRows.forEach(row => {
        let lat = latIdx >= 0 ? parseFloat(row[latIdx]) : NaN;
        let lon = lonIdx >= 0 ? parseFloat(row[lonIdx]) : NaN;
        const zip = zipIdx >= 0 ? String(row[zipIdx] || '').replace(/\D/g, '').slice(0, 5) : '';
        const city = cityIdx >= 0 ? (row[cityIdx] || '') : '';
        const date = dateIdx >= 0 ? (row[dateIdx] || '') : '';

        if (isNaN(lat) || isNaN(lon)) {
            // Try to geocode from ZIP using boundary centroids
            if (zip && zipCentroids[zip]) {
                const c = zipCentroids[zip];
                lat = c[0]; lon = c[1];
            } else if (zip && boundaryFeatures) {
                // Reverse geocode: find ZIP in boundaries
                for (const f of boundaryFeatures) {
                    if (f.properties.zip === zip) {
                        const coords = f.geometry.type === 'MultiPolygon' ? f.geometry.coordinates[0][0] : f.geometry.coordinates[0];
                        if (coords && coords.length) {
                            let sLat = 0, sLon = 0;
                            coords.forEach(c => { sLon += c[0]; sLat += c[1]; });
                            lat = sLat / coords.length;
                            lon = sLon / coords.length;
                        }
                        break;
                    }
                }
            }
            if (isNaN(lat) || isNaN(lon)) { needGeocode++; return; }
        }

        points.push([lat, lon, city, zip, date]);
    });

    // Add to sales cluster
    points.forEach(d => {
        const marker = L.circleMarker([d[0], d[1]], {
            radius: 4, fillColor: '#10b981', color: '#10b981', weight: 0, fillOpacity: 0.7
        });
        marker.bindPopup(`<b style="color:#10b981;"> Uploaded</b><br>${d[2]}<br>ZIP: ${d[3]}<br>${d[4]}`);
        marker.addTo(fg.salesCluster);
    });

    // Enable cluster layer
    if (!map.hasLayer(fg.salesCluster)) {
        map.addLayer(fg.salesCluster);
        const tog = document.getElementById('tog-salesCluster');
        if (tog) tog.checked = true;
    }

    status.textContent = `✅ Added ${points.length} points.${needGeocode > 0 ? ` ${needGeocode} couldn't be geocoded.` : ''}`;
    document.getElementById('upload-mapping').style.display = 'none';

    setTimeout(closeUpload, 2000);
}

// ═══════════════════════════════════════════════════
// ██  INIT                                         ██
// ═══════════════════════════════════════════════════
function initMap() {
    map = L.map('map', {
        center: [42.85, -75.80],
        zoom: 7,
        zoomControl: true,
        preferCanvas: true,
        maxZoom: 18,
        minZoom: 5
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap © CARTO',
        maxZoom: 19
    }).addTo(map);

    // Check URL param for deep linking from landing page
    const urlParams = new URLSearchParams(window.location.search);
    const requestedState = urlParams.get('state');
    const initState = (requestedState && STATE_CONFIG[requestedState]) ? requestedState : 'NY';
    document.getElementById('state-select').value = initState;
    switchState(initState);
}

initMap();
</script>
